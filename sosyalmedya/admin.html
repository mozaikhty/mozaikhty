<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Yönetimi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .header { text-align: center; border-bottom: 2px solid #e74c3c; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #e74c3c; letter-spacing: 2px; }
        
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #e74c3c; }

        .container { max-width: 800px; margin: 0 auto; }
        
        /* YENİ: ARAMA KUTUSU TASARIMI */
        .admin-search-box { margin-bottom: 20px; position: relative; }
        .admin-search-input { width: 100%; box-sizing: border-box; padding: 12px 15px; border-radius: 8px; border: 1px solid #444; background: #2c3e50; color: white; font-size: 15px; outline: none; }
        .admin-search-input:focus { border-color: #3498db; }

        .list-item { background: #2c3e50; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .user-info { font-size: 16px; font-weight: bold; }
        .badge { font-size: 12px; padding: 3px 8px; border-radius: 10px; margin-left: 10px; }
        .bg-blue { background: #3498db; }
        .bg-red { background: #e74c3c; }

        .action-btns button { border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left: 5px; color: white; }
        .btn-verify { background: #3498db; }
        .btn-ban { background: #e74c3c; }
        .btn-unban { background: #2ecc71; }

        .ticket-item { background: #2c3e50; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .ticket-header { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding-bottom: 8px; margin-bottom: 8px; font-size: 14px; color: #aaa; }
        .ticket-msg { font-size: 16px; line-height: 1.4; }
        .delete-ticket { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; float: right; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛠️ YÖNETİCİ PANELİ</h1>
        <p style="color:#aaa; font-size:14px;">Platform Kontrol Merkezi (@realdincer)</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-users-btn">👥 Kullanıcı Yönetimi</button>
        <button class="tab-btn" id="tab-tickets-btn">📬 Gelen Talepler</button>
    </div>

    <div class="container">
        <div id="users-section">
            <div class="admin-search-box">
                <input type="text" id="admin-user-search" class="admin-search-input" placeholder="Kullanıcı adı ile ara...">
            </div>
            <div id="users-list">Yükleniyor...</div>
        </div>

        <div id="tickets-section" style="display:none;">
            <div id="tickets-list">Yükleniyor...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyC07_DzrwOlwWwopQZhUkHL1sj2zPDIT7k", authDomain: "mozaiksosyalmedya.firebaseapp.com", projectId: "mozaiksosyalmedya", storageBucket: "mozaiksosyalmedya.firebasestorage.app", messagingSenderId: "492534131254", appId: "1:492534131254:web:6644008a553294be05c697" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        const ADMIN_USERNAME = "realdincer"; 
        let allUsers = []; // Tüm kullanıcıları burada tutacağız

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const myUsername = user.displayName || user.email.split('@')[0];
                if (myUsername !== ADMIN_USERNAME) { window.location.href = "feed.html"; return; }
                loadUsers();
                loadTickets();
            } else { window.location.href = "index.html"; }
        });

        document.getElementById('tab-users-btn').addEventListener('click', () => {
            document.getElementById('users-section').style.display = 'block';
            document.getElementById('tickets-section').style.display = 'none';
            document.getElementById('tab-users-btn').classList.add('active');
            document.getElementById('tab-tickets-btn').classList.remove('active');
        });
        document.getElementById('tab-tickets-btn').addEventListener('click', () => {
            document.getElementById('users-section').style.display = 'none';
            document.getElementById('tickets-section').style.display = 'block';
            document.getElementById('tab-tickets-btn').classList.add('active');
            document.getElementById('tab-users-btn').classList.remove('active');
        });

        // 1. KULLANICILARI ÇEK
        function loadUsers() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                allUsers = [];
                snapshot.forEach(docSnap => {
                    allUsers.push({ id: docSnap.id, ...docSnap.data() });
                });
                renderUserList(allUsers);
            });
        }

        // 2. KULLANICILARI EKRANA BAS (ARAMA UYUMLU)
        function renderUserList(users) {
            const list = document.getElementById('users-list');
            list.innerHTML = '';
            users.forEach(user => {
                const isVerified = user.isVerified || false;
                const isBanned = user.isBanned || false;
                let badgesHtml = '';
                if (isVerified) badgesHtml += '<span class="badge bg-blue">VIP</span>';
                if (isBanned) badgesHtml += '<span class="badge bg-red">BANLI</span>';

                list.innerHTML += `
                    <div class="list-item">
                        <div class="user-info">@${user.id} ${badgesHtml}</div>
                        <div class="action-btns">
                            <button class="btn-verify" onclick="window.toggleVerify('${user.id}', ${isVerified})">${isVerified ? 'Tiki Al' : 'Tik Ver'}</button>
                            <button class="${isBanned ? 'btn-unban' : 'btn-ban'}" onclick="window.toggleBan('${user.id}', ${isBanned})">${isBanned ? 'Ban Aç' : 'Banla'}</button>
                        </div>
                    </div>
                `;
            });
        }

        // 3. CANLI ARAMA MANTIĞI
        document.getElementById('admin-user-search').addEventListener('input', (e) => {
            const text = e.target.value.toLowerCase().trim();
            const filtered = allUsers.filter(u => u.id.toLowerCase().includes(text));
            renderUserList(filtered);
        });

        function loadTickets() {
            const q = query(collection(db, "tickets"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('tickets-list');
                list.innerHTML = '';
                if(snapshot.empty) { list.innerHTML = '<p>Destek talebi yok.</p>'; return; }
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    let dateStr = data.createdAt ? data.createdAt.toDate().toLocaleString() : "Tarih Yok";
                    list.innerHTML += `
                        <div class="ticket-item">
                            <div class="ticket-header"><span><b>@${data.sender}</b> -> @${data.reportedProfile}</span><span>${dateStr}</span></div>
                            <div class="ticket-msg">"${data.message}"</div>
                            <button class="delete-ticket" onclick="window.deleteTicket('${docSnap.id}')">Kapat</button>
                            <div style="clear:both;"></div>
                        </div>
                    `;
                });
            });
        }

        window.toggleVerify = async function(username, status) { if(confirm("Emin misin?")) await updateDoc(doc(db, "users", username), { isVerified: !status }); };
        window.toggleBan = async function(username, status) { if(confirm("Emin misin?")) await updateDoc(doc(db, "users", username), { isBanned: !status }); };
        window.deleteTicket = async function(id) { if(confirm("Kapatılsın mı?")) await deleteDoc(doc(db, "tickets", id)); };
    </script>
</body>
</html>
